<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>해봄의 기록실</title>

    <!-- Open Graph / Link Preview (절대 URL 필수) -->
    <meta property="og:type"         content="website">
    <meta property="og:url"          content="https://aej100.github.io/haebom-card/">
    <meta property="og:title"        content="해봄의 기록실">
    <meta property="og:description"  content="브랜드와 공간의 가치를 설계하는 기록">
    <meta property="og:image"        content="https://aej100.github.io/haebom-card/jjini-portrait.png">
    <meta property="og:image:width"  content="800">
    <meta property="og:image:height" content="800">
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="해봄의 기록실">
    <meta name="twitter:description" content="브랜드와 공간의 가치를 설계하는 기록">
    <meta name="twitter:image"       content="https://aej100.github.io/haebom-card/jjini-portrait.png">
    <meta name="description"         content="브랜드와 공간의 가치를 설계하는 기록">
    <link rel="icon" type="image/png" href="jjini-portrait.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #040408;
            background-image:
                radial-gradient(circle at 50% 40%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
            overflow: hidden;
            perspective: 1200px;
        }

        .chrome-text {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(
                to bottom,
                #ffffff 0%,
                #e2e8f0 40%,
                #94a3b8 45%,
                #cbd5e1 55%,
                #ffffff 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 15px rgba(255, 255, 255, 0.25));
            letter-spacing: -0.02em;
        }

        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
            transform-style: preserve-3d;
            animation: spinOrbit 60s linear infinite;
        }

        .three-d-scene {
            perspective: 1000px;
            transform-style: preserve-3d;
            position: relative;  /* needed for .click-badge absolute positioning */
        }

        .portrait-card {
            width: 280px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .portrait-card.dragging { cursor: grabbing; }

        .layer-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255,255,255,0.05);
            transform: translateZ(-20px);
            backdrop-filter: blur(10px);
            backface-visibility: hidden;
        }

        /* Pulsing glow signals card is clickable — animates opacity only,
           safe inside preserve-3d, no stacking context created */
        @keyframes glowPulse {
            0%, 100% { opacity: 0.45; }
            50%       { opacity: 1;    }
        }
        .layer-glow {
            position: absolute;
            inset: -10px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.35) 0%, transparent 70%);
            border-radius: 40px;
            transform: translateZ(-40px);
            pointer-events: none;
            backface-visibility: hidden;
            animation: glowPulse 2.8s ease-in-out infinite;
        }

        .layer-portrait {
            position: absolute;
            inset: 12px;
            border-radius: 24px;
            overflow: hidden;
            transform: translateZ(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            background-color: rgba(255, 255, 255, 0.02);
            backface-visibility: hidden;
        }

        .portrait-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .layer-glass-frame {
            position: absolute;
            inset: 0;
            border-radius: 32px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transform: translateZ(35px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2);
            backface-visibility: hidden;
        }

        /* Card back face — JS controls display:none / display:flex
           No rotateY transform needed — JS swaps content at mid-flip */
        .card-back {
            position: absolute;
            inset: 0;
            border-radius: 28px;
            display: none;  /* hidden by default; JS shows on flip */
            background: linear-gradient(145deg, rgba(18,8,42,0.98) 0%, rgba(32,12,68,0.98) 55%, rgba(10,6,24,0.98) 100%);
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.12), inset 0 0 60px rgba(80, 20, 160, 0.08);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 28px;
            gap: 18px;
            overflow: hidden;
            z-index: 2;
        }
        .card-back::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
            pointer-events: none;
        }
        .cb-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            color: #a78bfa;
            text-transform: uppercase;
        }
        .cb-divider {
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,92,246,0.6), transparent);
        }
        .cb-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 0.05em;
        }
        .cb-role {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
            line-height: 1.7;
            text-align: center;
            word-break: keep-all;
        }
        .cb-desc {
            font-size: 0.78rem;
            color: #94a3b8;
            text-align: center;
            line-height: 1.6;
            word-break: keep-all;
        }
        .cb-hint {
            font-size: 0.6rem;
            color: rgba(139,92,246,0.5);
            letter-spacing: 0.15em;
            font-family: 'Orbitron', sans-serif;
            margin-top: 8px;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.35), rgba(168, 85, 247, 0.05) 60%, rgba(236, 72, 153, 0.1) 100%);
            box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.25), 0 10px 25px rgba(168, 85, 247, 0.15);
            backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: floatAndPop 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            pointer-events: none;
        }

        .drag-icon {
            position: absolute;
            cursor: grab;
            user-select: none;
            touch-action: none;
            z-index: 50;
            animation: gentleFloat 6s ease-in-out infinite alternate;
        }

        .drag-icon:active {
            cursor: grabbing;
        }

        .icon-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(168, 85, 247, 0.3);
            transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
            overflow: hidden;
            border-radius: 9999px;
        }

        .icon-inner:hover {
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow:
                0 15px 30px rgba(0, 0, 0, 0.7),
                0 0 30px rgba(168, 85, 247, 0.6);
            transform: scale(1.12);
        }

        /* Black-background chrome icons: screen blend removes the black */
        .chrome-blend-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mix-blend-mode: screen;
        }

        /* Blog icon has a light background — invert first so screen blend works */
        .chrome-blend-img-invert {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: invert(1);
            mix-blend-mode: screen;
        }

        /* White-bg icon images — canvas replaces img after background removal */
        .icon-rm-white {
            width: 100%; height: 100%; object-fit: cover;
        }
        .icon-inner canvas {
            display: block; width: 100%; height: 100%; object-fit: cover;
        }

        /* Chrome deco objects — children of orbit-arm divs */
        .chrome-deco-img {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(0 6px 18px rgba(168, 85, 247, 0.6));
        }

        /* Canvas elements injected by JS background-removal script */
        .chrome-deco-img canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Fallback img styles */
        .chrome-deco-img .deco-img-screen,
        .chrome-deco-img .deco-img-invert {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Orbit: arm rotates around center; deco counter-rotates to stay upright */
        @keyframes orbitCW  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
        @keyframes orbitCCW { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
        @keyframes keepUprightCW  { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
        @keyframes keepUprightCCW { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }

        @keyframes spinOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slowSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes floatAndPop {
            0% {
                transform: translateY(120vh) scale(0.6) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.8;
                transform: translateY(-20vh) scale(1) rotate(45deg);
            }
            92% {
                transform: translateY(-25vh) scale(1.15) rotate(50deg);
                opacity: 0.8;
            }
            95%, 100% {
                transform: translateY(-28vh) scale(0) rotate(55deg);
                opacity: 0;
            }
        }

        .star-particle {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.9; }
        }

        .icon-tooltip {
            position: absolute;
            bottom: -28px;
            font-size: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            color: #a78bfa;
            opacity: 0.9;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(168, 85, 247, 0.5);
            font-weight: 800;
        }

        /* Flip hint — fades in on hover, stays subtle */
        @keyframes hintBlink {
            0%, 100% { opacity: 0.55; }
            50%       { opacity: 1;    }
        }
        /* card-click-hint — 카드 내부에서는 숨김 (외부 click-badge로 대체) */
        .card-click-hint { display: none; }

        /* ── Click badge — 카드 프레임 아래 외부 라벨 ──────────────────── */
        @keyframes hintPulse {
            0%, 100% { opacity: 0.42; }
            50%       { opacity: 0.85; }
        }
        .click-badge {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: rgba(167, 139, 250, 0.68);
            pointer-events: none;
            white-space: nowrap;
            animation: hintPulse 2.4s ease-in-out infinite;
            text-shadow: 0 0 14px rgba(139, 92, 246, 0.45);
        }
        .three-d-scene:hover .click-badge {
            color: rgba(210, 170, 255, 0.95);
            text-shadow: 0 0 16px rgba(139, 92, 246, 0.85);
        }

        /* ── Holographic light + glow ring during flip ───────────────────── */
        @keyframes shineSweep {
            0%   { background-position: 240% center; opacity: 0; }
            12%  { opacity: 1; }
            88%  { opacity: 1; }
            100% { background-position: -80% center; opacity: 0; }
        }
        /* radial-gradient 방식 — 가장자리가 투명으로 자연스럽게 페이드
           overflow:hidden에 잘려도 딱딱한 경계선이 생기지 않음 */
        @keyframes glowRing {
            0%   { opacity: 0;   transform: scale(0.88); }
            28%  { opacity: 1;   transform: scale(1.00); }
            70%  { opacity: 1;   transform: scale(1.00); }
            100% { opacity: 0;   transform: scale(1.10); }
        }
        .card-shine {
            position: absolute;
            inset: 0;
            border-radius: 30px;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            background: linear-gradient(
                112deg,
                transparent 14%,
                rgba(255, 255, 255, 0.18) 33%,
                rgba(210, 140, 255, 0.55) 48%,
                rgba(255, 255, 255, 0.18) 63%,
                transparent 82%
            );
            background-size: 270% 100%;
            background-position: 240% center;
        }
        .portrait-card.is-flipping .card-shine {
            animation: shineSweep 0.72s ease-in-out forwards;
        }
        /* 외부 발광 — box-shadow 대신 radial-gradient
           중심이 밝고 가장자리로 갈수록 투명 → 어디서 잘려도 경계선 없음 */
        .card-glow-ring {
            position: absolute;
            inset: -70px;          /* 카드보다 넉넉히 크게 */
            border-radius: 999px;  /* 완전히 둥근 형태 */
            border: none;
            pointer-events: none;
            z-index: 60;
            opacity: 0;
            background: radial-gradient(ellipse at center,
                rgba(168, 85, 247, 0.72)  0%,
                rgba(139, 92, 246, 0.50) 22%,
                rgba(139, 92, 246, 0.22) 48%,
                rgba(139, 92, 246, 0.00) 72%
            );
        }
        .portrait-card.is-flipping .card-glow-ring {
            animation: glowRing 0.72s ease-in-out forwards;
        }
        /* 플립 중 내부 글로우 */
        .portrait-card.is-flipping .layer-glow {
            opacity: 1;
            animation: none;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.70) 0%, transparent 70%);
        }
        /* Hover — 카드 외곽 글로우 강화 */
        #portraitCard:hover:not(.dragging) .layer-bg {
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(255, 255, 255, 0.05),
                0 0 28px rgba(168, 85, 247, 0.55);
            transition: box-shadow 0.35s ease;
        }
        #portraitCard:hover:not(.dragging) .layer-glow {
            opacity: 1;
            animation: glowPulse 1.5s ease-in-out infinite;
        }

        /* Clipboard toast */
        #copy-toast {
            position: fixed;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: rgba(109, 40, 217, 0.92);
            color: #f5f3ff;
            padding: 9px 22px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            z-index: 9999;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(167,139,250,0.35);
            box-shadow: 0 4px 20px rgba(109,40,217,0.4);
        }
        #copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Mobile Business Card Layout ─────────────────────────────────── */
        @media (max-width: 640px) {
            /* Body */
            body {
                overflow-x: hidden;
                overflow-y: auto;
                height: auto;
                min-height: 100svh;
                padding: 20px 0 24px;
                justify-content: flex-start;
                gap: 0;
            }

            /* Header */
            header {
                padding: 0 12px;
                margin-bottom: 0px;
            }
            header span.text-xs {
                font-size: 0.58rem !important;
                letter-spacing: 0.18em !important;
            }
            header h1 {
                /* clamp: 화면이 좁을수록 자동으로 줄어듦 — 갤럭시 넘침 방지 */
                font-size: clamp(0.92rem, 4.5vw, 1.45rem) !important;
                letter-spacing: 0 !important;
                line-height: 1.15;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 100%;
            }
            header p {
                font-size: 0.58rem !important;
                letter-spacing: 0.22em !important;
            }

            /* Main scene — clip orbit decos, keep compact */
            main {
                overflow: hidden;
                height: 340px !important;
                max-width: 100vw !important;
                flex-shrink: 0;
            }

            /* Portrait card — smaller but prominent */
            .portrait-card {
                width: 195px !important;
                height: 265px !important;
            }

            /* Orbit rings — hide on mobile */
            .orbit-ring { display: none; }

            /* Bubbles — 모바일: px 기반으로 bottom 고정, overflow 전에 페이드 */
            .bubble {
                width: 24px !important;
                height: 24px !important;
                top: 100% !important;   /* 컨테이너 맨 아래에서 시작 */
                animation: floatMobile 13s ease-in-out infinite !important;
            }

            /* Icons — reposition to sit at edges, fully visible */
            #icon-tel     { left: 4px !important;  right: auto !important; top: 6% !important;    bottom: auto !important; }
            #icon-mail    { left: 4px !important;  right: auto !important; top: 41% !important;   bottom: auto !important; }
            #icon-doc     { left: 4px !important;  right: auto !important; top: auto !important;  bottom: 6% !important;   }
            #icon-insta   { right: 4px !important; left: auto !important;  top: 6% !important;    bottom: auto !important; }
            #icon-threads { right: 4px !important; left: auto !important;  top: 41% !important;   bottom: auto !important; }
            #icon-b       { right: 4px !important; left: auto !important;  top: auto !important;  bottom: 5% !important;   }

            /* Icon spheres — slightly smaller for mobile, still easy to tap (min 56px) */
            .icon-inner {
                width: 58px !important;
                height: 58px !important;
            }

            /* Tooltips — hide on mobile to save space */
            .icon-tooltip { display: none; }

            /* Footer */
            footer {
                margin-top: 10px;
                padding: 0 16px;
            }
            footer p { display: none; }
        }

        /* 모바일 버블: main 높이(340px) 안에서만 이동, top 도달 전 완전 페이드 */
        @keyframes floatMobile {
            0%   { transform: translateY(10px)   scale(0.5); opacity: 0;    }
            9%   { opacity: 0.55; }
            55%  { opacity: 0.55; transform: translateY(-210px) scale(0.9) rotate(18deg); }
            78%  { opacity: 0;    transform: translateY(-295px) scale(0.35) rotate(32deg); }
            100% { opacity: 0;    transform: translateY(-340px) scale(0); }
        }

        /* Extra small screens (iPhone SE, narrow phones) */
        @media (max-width: 390px) {
            header h1 { font-size: 1.4rem !important; }
            main { height: 310px !important; }
            .portrait-card { width: 170px !important; height: 235px !important; }
            .icon-inner { width: 52px !important; height: 52px !important; }
        }
    </style>
</head>
<body class="w-full h-screen flex flex-col items-center justify-between py-12 px-6">

    <div id="starfield" class="absolute inset-0 pointer-events-none z-0"></div>

    <svg class="absolute pointer-events-none" style="width: 0; height: 0;">
        <defs>
            <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="20%" stop-color="#cbd5e1" />
                <stop offset="40%" stop-color="#475569" />
                <stop offset="45%" stop-color="#334155" />
                <stop offset="50%" stop-color="#94a3b8" />
                <stop offset="70%" stop-color="#f8fafc" />
                <stop offset="100%" stop-color="#475569" />
            </linearGradient>
            <linearGradient id="chromeGlowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
                <stop offset="50%" stop-color="#ffffff" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.3"/>
            </linearGradient>
        </defs>
    </svg>

    <header class="text-center z-10 select-none pointer-events-none transform translate-y-2">
        <span class="text-xs font-orbitron font-semibold tracking-[0.4em] text-indigo-400 uppercase block mb-3 opacity-90">
            PERSONAL WORKBOOK SYSTEM
        </span>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-wide uppercase chrome-text">
            Haebom's Work Log
        </h1>
        <div class="flex items-center justify-center gap-3 mt-3">

    <script>
        // ── ICON CONFIG (single source of truth) ──────────────────────────────
        // data-action: "link" | "email" | "tel"
        // data-value : URL, email address, or phone number
        // To update links, edit the HTML data attributes on each .drag-icon
        // ──────────────────────────────────────────────────────────────────────

        // Starfield — increased to 80 stars for denser sparkle
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star-particle';
            const size = Math.random() * 2;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 4}s`;
            starfield.appendChild(star);
        }

        // ── Portrait Card — Fold / Swap / Unfold Flip ─────────────────────
        // backface-visibility:hidden이 z-index stacking context에서 작동 안 하므로
        // 대신 "90도로 접기 → display 교체 → -90도에서 펼치기" 기법 사용.
        // 어떤 브라우저에서도 100% 작동.
        const portraitCard = document.getElementById('portraitCard');
        let isFlipped      = false;
        let isAnimating    = false;
        let cardDragActive = false, cardDragDid = false;
        let cardDragStartX = 0, cardDragStartY = 0;

        // 앞면/뒷면 레이어 참조 (card-click-hint는 CSS로 hidden 처리, JS에서 제외)
        const cardBack    = portraitCard.querySelector('.card-back');
        const frontLayers = [
            portraitCard.querySelector('.layer-glow'),
            portraitCard.querySelector('.layer-bg'),
            portraitCard.querySelector('.layer-portrait'),
            portraitCard.querySelector('.layer-glass-frame'),
        ];

        // 초기 상태 — 뒷면 숨김
        cardBack.style.display = 'none';

        function showFront() {
            frontLayers.forEach(el => { if (el) el.style.display = ''; });
            cardBack.style.display = 'none';
        }
        function showBack() {
            frontLayers.forEach(el => { if (el) el.style.display = 'none'; });
            cardBack.style.display = 'flex';
        }

        // ── 카드 플립 효과음 (Web Audio API 생성 whoosh) ──────────────────
        function playFlipSound() {
            try {
                const sh = window._sharedAC;
                const ac   = (sh && sh.state === 'running') ? sh : new (window.AudioContext || window.webkitAudioContext)();
                const dest = (ac === window._sharedAC && window._sharedMaster) ? window._sharedMaster : ac.destination;
                const dur  = 0.20;
                const buf  = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
                const d    = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++)
                    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 0.75);
                const src = ac.createBufferSource(); src.buffer = buf;
                const bp  = ac.createBiquadFilter();
                bp.type   = 'bandpass';
                bp.frequency.setValueAtTime(350, ac.currentTime);
                bp.frequency.exponentialRampToValueAtTime(4200, ac.currentTime + 0.14);
                bp.Q.value = 0.55;
                const g = ac.createGain();
                g.gain.setValueAtTime(0.32, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
                src.connect(bp); bp.connect(g); g.connect(dest);
                src.start(); src.stop(ac.currentTime + dur + 0.05);
                if (ac !== window._sharedAC) setTimeout(() => { try { ac.close(); } catch(e){} }, 600);
            } catch(e) {}
        }

        // 핵심 플립: 빠르게 접기 → 콘텐츠 교체 → 천천히 펼치기 (빠르게→천천히)
        function doFlip() {
            playFlipSound();  // 효과음
            // 홀로그래픽 빛 + 글로우 링 시작
            portraitCard.classList.add('is-flipping');
            setTimeout(() => portraitCard.classList.remove('is-flipping'), 760);

            // 1단계: 빠르게 90도로 접기 (강한 ease-in → 카드가 홱 돌아감)
            portraitCard.style.transition = 'transform 0.15s cubic-bezier(0.55, 0, 1, 1)';
            portraitCard.style.transform  = 'rotateY(90deg)';
            setTimeout(() => {
                // 2단계: 안 보이는 상태에서 콘텐츠 교체
                isFlipped = !isFlipped;
                if (isFlipped) showBack(); else showFront();
                // 3단계: 순간 -90도로 점프 (여전히 edge-on)
                portraitCard.style.transition = 'none';
                portraitCard.style.transform  = 'rotateY(-90deg)';
                portraitCard.offsetHeight;   // 강제 reflow
                // 4단계: 천천히 펼치기 (강한 ease-out → 점점 느려짐)
                portraitCard.style.transition = 'transform 0.52s cubic-bezier(0, 0, 0.12, 1)';
                portraitCard.style.transform  = 'rotateY(0deg)';
                setTimeout(() => { isAnimating = false; }, 540);
            }, 140);
        }

        function flipCard() {
            if (isAnimating) return;
            isAnimating = true;
            doFlip();
        }

        // 드래그 시작
        portraitCard.addEventListener('pointerdown', (e) => {
            if (isAnimating) return;
            cardDragActive = true;
            cardDragDid    = false;
            cardDragStartX = e.clientX;
            cardDragStartY = e.clientY;
            portraitCard.style.transition = 'none';
            portraitCard.classList.add('dragging');
            portraitCard.setPointerCapture(e.pointerId);
        });

        // 드래그 중 — ±85°로 클램프 (90° 넘어가면 카드가 뒤집혀 내용이 사라지는 문제 방지)
        portraitCard.addEventListener('pointermove', (e) => {
            if (!cardDragActive) return;
            const dx = e.clientX - cardDragStartX;
            const dy = e.clientY - cardDragStartY;
            if (Math.abs(dx) > 4 || Math.abs(dy) > 4) cardDragDid = true;
            const tiltY = Math.max(-85, Math.min(85, dx * 0.45));
            const tiltX = Math.max(-28, Math.min(28, -dy * 0.4));
            portraitCard.style.transform = `rotateY(${tiltY}deg) rotateX(${tiltX}deg)`;
        });

        // 드래그 끝 — 클릭이면 플립, 드래그 55px+ 이상이면 플립, 아니면 원위치
        portraitCard.addEventListener('pointerup', (e) => {
            if (!cardDragActive) return;
            cardDragActive = false;
            portraitCard.classList.remove('dragging');

            if (!cardDragDid) {
                // 순수 탭/클릭 → 플립
                flipCard();
                return;
            }

            const dx = e.clientX - cardDragStartX;
            isAnimating = true;
            if (Math.abs(dx) > 55) {
                // 충분히 드래그 → fold/swap/unfold 플립 (빛 효과 포함)
                portraitCard.classList.add('is-flipping');
                setTimeout(() => portraitCard.classList.remove('is-flipping'), 600);
                portraitCard.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 1, 1)';
                portraitCard.style.transform  = 'rotateY(90deg)';
                setTimeout(() => {
                    isFlipped = !isFlipped;
                    if (isFlipped) showBack(); else showFront();
                    portraitCard.style.transition = 'none';
                    portraitCard.style.transform  = 'rotateY(-90deg)';
                    portraitCard.offsetHeight;
                    portraitCard.style.transition = 'transform 0.28s cubic-bezier(0, 0, 0.6, 1)';
                    portraitCard.style.transform  = 'rotateY(0deg)';
                    setTimeout(() => { isAnimating = false; }, 300);
                }, 160);
            } else {
                // 드래그 부족 → 원위치 (0deg)
                portraitCard.style.transition = 'transform 0.45s cubic-bezier(0.25, 1, 0.5, 1)';
                portraitCard.style.transform  = 'rotateY(0deg) rotateX(0deg)';
                setTimeout(() => { isAnimating = false; }, 460);
            }
        });

        // 인터럽트 시 원위치
        portraitCard.addEventListener('pointercancel', () => {
            if (!cardDragActive) return;
            cardDragActive = false;
            portraitCard.classList.remove('dragging');
            isAnimating = true;
            portraitCard.style.transition = 'transform 0.4s ease';
            portraitCard.style.transform  = 'rotateY(0deg) rotateX(0deg)';
            setTimeout(() => { isAnimating = false; }, 420);
        });

        // ── Toast helper ──────────────────────────────────────────────────────
        const toast = document.getElementById('copy-toast');
        let toastTimer = null;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ── Icon action dispatcher ────────────────────────────────────────────
        function handleIconTap(icon) {
            const action = icon.dataset.action;
            const value  = icon.dataset.value;
            if (!action || !value) return;

            if (action === 'link') {
                window.open(value, '_blank', 'noopener,noreferrer');

            } else if (action === 'email') {
                // Copy to clipboard, show 복사완료 toast
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(value)
                        .then(() => showToast('복사완료 ✓  ' + value))
                        .catch(() => fallbackCopy(value));
                } else {
                    fallbackCopy(value);
                }

            } else if (action === 'tel') {
                // Opens phone dialer — user confirms before calling
                window.location.href = 'tel:' + value.replace(/-/g, '');
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            try { document.execCommand('copy'); showToast('복사완료 ✓  ' + text); }
            catch (e) { showToast('이메일: ' + text); }
            document.body.removeChild(ta);
        }

        // ── Icon free-drag + tap ──────────────────────────────────────────────
        document.querySelectorAll('.drag-icon').forEach(icon => {
            let active = false, didDrag = false;
            let offsetLeft = 0, offsetTop = 0;
            let startX = 0, startY = 0;

            icon.style.cursor = 'pointer';

            icon.addEventListener('pointerdown', (e) => {
                active = true;
                didDrag = false;
                startX = e.clientX;
                startY = e.clientY;
                icon.setPointerCapture(e.pointerId);
                const rect = icon.getBoundingClientRect();
                offsetLeft = e.clientX - rect.left;
                offsetTop  = e.clientY - rect.top;
                icon.style.animation = 'none';
                icon.style.zIndex = 100;
            });

            icon.addEventListener('pointermove', (e) => {
                if (!active) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                if (Math.abs(dx) > 6 || Math.abs(dy) > 6) didDrag = true;
                const pr = icon.parentElement.getBoundingClientRect();
                icon.style.left   = `${e.clientX - pr.left - offsetLeft}px`;
                icon.style.top    = `${e.clientY - pr.top  - offsetTop}px`;
                icon.style.bottom = 'auto';
                icon.style.right  = 'auto';
            });

            const stopDrag = (e) => {
                if (!active) return;
                active = false;
                icon.releasePointerCapture(e.pointerId);
                icon.style.zIndex = 50;
                icon.style.animation = 'gentleFloat 6s ease-in-out infinite alternate';
                if (!didDrag) handleIconTap(icon);
            };

            icon.addEventListener('pointerup',     stopDrag);
            icon.addEventListener('pointercancel', stopDrag);
        });

        // Canvas-based background removal for chrome deco images.
        // This avoids CSS mix-blend-mode GPU-compositing issues entirely:
        // transparent canvas pixels naturally show the page backdrop.
        (function removeDécoBackgrounds() {
            function process(imgEl, removeWhite) {
                const run = () => {
                    if (!imgEl.naturalWidth) return;
                    const canvas = document.createElement('canvas');
                    canvas.width  = imgEl.naturalWidth;
                    canvas.height = imgEl.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(imgEl, 0, 0);
                    try {
                        const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const d  = id.data;
                        const hard = removeWhite ? 230 : 30;   // outer threshold (fully transparent)
                        const soft = removeWhite ? 200 : 60;   // inner threshold (fade zone)
                        for (let i = 0; i < d.length; i += 4) {
                            const r = d[i], g = d[i+1], b = d[i+2];
                            if (removeWhite) {
                                const lo = Math.min(r, g, b);
                                if (lo >= hard) {
                                    d[i+3] = 0;
                                } else if (lo >= soft) {
                                    d[i+3] = Math.round(d[i+3] * (1 - (lo - soft) / (hard - soft)));
                                }
                            } else {
                                const hi = Math.max(r, g, b);
                                if (hi <= hard) {
                                    d[i+3] = 0;
                                } else if (hi <= soft) {
                                    d[i+3] = Math.round(d[i+3] * ((hi - hard) / (soft - hard)));
                                }
                            }
                        }
                        ctx.putImageData(id, 0, 0);
                        canvas.style.cssText = 'display:block;width:100%;height:100%;object-fit:contain;';
                        imgEl.replaceWith(canvas);
                    } catch (e) { /* CORS or security — leave original img */ }
                };
                if (imgEl.complete && imgEl.naturalWidth > 0) run();
                else imgEl.addEventListener('load', run);
            }

            document.querySelectorAll('.deco-img-screen').forEach(img => process(img, false));
            document.querySelectorAll('.deco-img-invert').forEach(img => process(img, true));
            // Icon images with white/gray background — strip white, show silver only
            document.querySelectorAll('.icon-rm-white').forEach(img => process(img, true));
        })();

        // ── Smooth Jazz Music (Web Audio API — 저작권 없는 생성 음악) ──────────
        // 92 BPM 스윙 재즈: 피아노 + 워킹베이스 + 라이드심벌 + 브러시스네어
        // Am7–Dm7–G7–Cmaj7 재즈 진행
        (function() {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;

            let ctx = null, master = null;
            let playing = false, schedId = null;
            let nextBar = 0, barIdx = 0;
            let autoStarted = false;

            const BPM  = 92;
            const beat = 60 / BPM;   // ~0.652s
            const sw   = beat * 2/3; // swing 8th 장박
            const sh   = beat * 1/3; // swing 8th 단박

            /* ── 악기 ── */
            // 피아노: 배음 3개로 어쿠스틱 느낌
            function piano(freq, t, dur, vol) {
                if (!freq || !ctx) return;
                vol = vol || 0.10;
                [1, 2, 3].forEach((h, i) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.type = 'sine'; o.frequency.value = freq * h;
                    const hv = [vol, vol*0.30, vol*0.12][i];
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(hv, t + 0.005);
                    g.gain.exponentialRampToValueAtTime(hv * 0.45, t + 0.10);
                    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                    o.connect(g); g.connect(master);
                    o.start(t); o.stop(t + dur + 0.05);
                });
            }

            // 워킹 베이스
            function walkBass(freq, t, dur) {
                if (!ctx) return;
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.type = 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(0.44, t + 0.012);
                g.gain.setValueAtTime(0.38, t + dur * 0.75);
                g.gain.linearRampToValueAtTime(0, t + dur);
                o.connect(g); g.connect(master);
                o.start(t); o.stop(t + dur + 0.05);
            }

            // 라이드 심벌 (재즈 특유의 메탈릭 shimmer)
            function ride(t, vol) {
                if (!ctx) return;
                const dur = 0.10;
                const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
                const src = ctx.createBufferSource(); src.buffer = buf;
                const bp = ctx.createBiquadFilter();
                bp.type = 'bandpass'; bp.frequency.value = 7000; bp.Q.value = 3;
                const hp = ctx.createBiquadFilter();
                hp.type = 'highpass'; hp.frequency.value = 5500;
                const g = ctx.createGain();
                g.gain.setValueAtTime(vol || 0.13, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur * 2.5);
                src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(master);
                src.start(t); src.stop(t + dur * 2.5 + 0.01);
            }

            // 브러시 스네어 (부드러운 재즈 드럼)
            function brushSnare(t) {
                if (!ctx) return;
                const dur = 0.14;
                const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++)
                    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/d.length, 1.6);
                const src = ctx.createBufferSource(); src.buffer = buf;
                const bp = ctx.createBiquadFilter();
                bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 0.6;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0.20, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                src.connect(bp); bp.connect(g); g.connect(master);
                src.start(t); src.stop(t + dur + 0.01);
            }

            // 라이트 킥 (재즈는 킥이 가볍고 낮음)
            function lightKick(t) {
                if (!ctx) return;
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.frequency.setValueAtTime(115, t);
                o.frequency.exponentialRampToValueAtTime(42, t + 0.07);
                g.gain.setValueAtTime(0.48, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
                o.connect(g); g.connect(master);
                o.start(t); o.stop(t + 0.24);
            }

            /* ── 코드 & 멜로디 ── */
            // 워킹 베이스: 코드별 4 quarter notes
            const walkBassNotes = [
                [110.00, 130.81, 164.81, 196.00],  // Am7: A2 C3 E3 G3
                [146.83, 174.61, 220.00, 261.63],  // Dm7: D3 F3 A3 C4
                [98.00,  123.47, 146.83, 174.61],  // G7:  G2 B2 D3 F3
                [130.81, 164.81, 196.00, 246.94],  // Cmaj7: C3 E3 G3 B3
            ];

            // 피아노 멜로디: 스윙 8분음표 8개 / bar (0=쉼)
            const mel = [
                [440.00, 0,      523.25, 440.00, 0,      587.33, 0,      523.25], // Am7
                [587.33, 622.25, 659.25, 0,      587.33, 523.25, 0,      440.00], // Dm7
                [392.00, 0,      440.00, 523.25, 587.33, 622.25, 587.33, 0     ], // G7
                [523.25, 0,      587.33, 0,      523.25, 440.00, 392.00, 0     ], // Cmaj7
            ];

            function schedBar(t) {
                const b = barIdx % 4;
                const barDur = beat * 4;

                // 워킹 베이스 (4 quarter notes)
                walkBassNotes[b].forEach((f, i) => walkBass(f, t + i * beat, beat * 0.88));

                // 라이드 심벌 (스윙 8분음표)
                for (let i = 0; i < 4; i++) {
                    ride(t + i * beat,      0.15); // 강박
                    ride(t + i * beat + sw, 0.09); // 약박 (스윙)
                }

                // 킥 (1, 3박)
                lightKick(t);
                lightKick(t + beat * 2);

                // 브러시 스네어 (2, 4박)
                brushSnare(t + beat);
                brushSnare(t + beat * 3);

                // 피아노 멜로디 (스윙 8분음표)
                mel[b].forEach((freq, i) => {
                    if (!freq) return;
                    const beatIdx = Math.floor(i / 2);
                    const isUp    = i % 2 === 1;
                    const st  = t + beatIdx * beat + (isUp ? sw : 0);
                    const dur = (isUp ? sh : sw) * 0.82;
                    piano(freq, st, dur);
                });

                barIdx++;
            }

            function scheduler() {
                if (!playing) return;
                while (nextBar < ctx.currentTime + 0.6) {
                    schedBar(nextBar);
                    nextBar += beat * 4;
                }
                schedId = setTimeout(scheduler, 100);
            }

            /* ── 시작/정지 ── */
            function initCtx() {
                if (!ctx) {
                    ctx    = new AC();
                    master = ctx.createGain();
                    master.gain.value = 0.48;
                    master.connect(ctx.destination);
                }
            }

            function startMusic() {
                initCtx();
                if (ctx.state === 'suspended') ctx.resume();
                if (!playing) {
                    playing  = true;
                    barIdx   = 0;
                    nextBar  = ctx.currentTime + 0.05;
                    scheduler();
                }
                setBtnOn(true);
            }

            function stopMusic() {
                playing = false;
                clearTimeout(schedId);
                if (master) master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                setBtnOn(false);
            }

            /* ── 버튼 ── */
            const btn = document.createElement('div');
            btn.id = 'music-btn';
            btn.setAttribute('role', 'button');
            btn.setAttribute('aria-label', '음악 켜기/끄기');
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
                <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
            </svg>`;
            Object.assign(btn.style, {
                position:'fixed', bottom:'22px', right:'22px',
                width:'44px', height:'44px', borderRadius:'50%',
                border:'1.5px solid rgba(139,92,246,0.40)',
                background:'rgba(8,3,20,0.85)',
                color:'rgba(139,92,246,0.55)',
                display:'flex', alignItems:'center', justifyContent:'center',
                cursor:'pointer', zIndex:'9998',
                backdropFilter:'blur(14px)',
                transition:'all 0.3s ease',
                boxShadow:'0 2px 14px rgba(0,0,0,0.5)',
                userSelect:'none',
            });

            function setBtnOn(on) {
                btn.style.color       = on ? 'rgba(196,132,252,1)'       : 'rgba(139,92,246,0.55)';
                btn.style.borderColor = on ? 'rgba(168,85,247,0.85)'     : 'rgba(139,92,246,0.40)';
                btn.style.boxShadow   = on ? '0 0 20px rgba(168,85,247,0.6),0 2px 14px rgba(0,0,0,0.5)'
                                           : '0 2px 14px rgba(0,0,0,0.5)';
            }

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                playing ? stopMusic() : startMusic();
            });
            document.body.appendChild(btn);

            // ── 첫 번째 터치/클릭 시 자동 시작 ──────────────────────────────
            function onFirstInteraction() {
                if (autoStarted) return;
                autoStarted = true;
                startMusic();
            }
            ['touchstart','mousedown','keydown'].forEach(ev =>
                document.addEventListener(ev, onFirstInteraction, { once: true, passive: true })
            );

            // 일부 데스크탑 브라우저는 즉시 허용 — 미리 시도
            try {
                initCtx();
                if (ctx.state === 'running') onFirstInteraction();
            } catch(e) {}
        })();
    </script>
</body>
</html>
